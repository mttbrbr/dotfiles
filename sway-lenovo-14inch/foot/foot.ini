[main]
font=Iosevka Nerd Font:size=11
dpi-aware=yes
pad=14x10

[scrollback]
lines=10000

[cursor]
style=beam
blink=yes
blink-rate=500

[mouse]
hide-when-typing=yes

[colors-dark]
background=111411
foreground=a8b8a0

regular0=1e241e
regular1=a06060
regular2=7a9e7e
regular3=b8a070
regular4=6a8fa8
regular5=9a8aaa
regular6=6a9e8a
regular7=a8b8a0

bright0=2a322a
bright1=bf7878
bright2=9bbf9f
bright3=d4bc8a
bright4=88afc8
bright5=b8a8c8
bright6=88bfaa
bright7=c8d8be

[url]
launch=xdg-open ${url}
osc8-underline=url-mode
